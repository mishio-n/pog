name: Fetch race schedules

on:
  workflow_dispatch:
  schedule:
    # 07:00 Friday in Asia/Tokyo.
    - cron: "0 22 * * 4"

jobs:
  fetch-race-schedules:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      DATABASE_URL: ${{ secrets.DATABASE_URL }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma Client
        run: npx prisma generate

      - name: Fetch race schedules
        run: npm run fetch:race-schedules
