name: Fetch race schedule odds

on:
  workflow_dispatch:
    inputs:
      force:
        description: "Run even outside the regular odds update window"
        required: false
        type: boolean
        default: false
  schedule:
    # 07:00-08:00 Saturday/Sunday in Asia/Tokyo.
    - cron: "0 22,23 * * 5,6"
    # 09:00-16:00 Saturday/Sunday in Asia/Tokyo.
    - cron: "0 0-7 * * 6,0"

jobs:
  fetch-race-schedule-odds:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      DATABASE_URL: ${{ secrets.DATABASE_URL }}

    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10

      - name: Setup Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma Client
        run: npx prisma generate

      - name: Fetch race schedule odds
        run: |
          if [ "${{ github.event.inputs.force }}" = "true" ]; then
            npm run fetch:race-schedule-odds -- --force
          else
            npm run fetch:race-schedule-odds
          fi
